<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Media Gallery</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0e0e0e;--surface:#1a1a1a;--accent:#ff4d6d;--text:#f0f0f0;--muted:#666;--gap:12px;--cols:5;--radius:14px}
    body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;min-height:100vh}
    header{position:sticky;top:0;z-index:100;background:rgba(14,14,14,.88);backdrop-filter:blur(18px);border-bottom:1px solid #222;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .logo{font-size:1.1rem;font-weight:500}
    .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block;margin-right:6px}
    .controls{display:flex;gap:10px;align-items:center}
    .btn{background:var(--surface);color:var(--text);border:1px solid #333;border-radius:8px;padding:7px 16px;font-size:.82rem;font-family:inherit;cursor:pointer;transition:all .2s}
    .btn:hover{background:#252525;border-color:#555}
    .filter-tabs{display:flex;gap:6px}
    .tab{background:transparent;color:var(--muted);border:1px solid #2a2a2a;border-radius:20px;padding:5px 14px;font-size:.78rem;font-family:inherit;cursor:pointer;transition:all .2s}
    .tab:hover{color:var(--text);border-color:#444}
    .tab.active{background:var(--text);color:#000;border-color:var(--text);font-weight:500}
    .count-badge{font-size:.75rem;color:var(--muted);white-space:nowrap}
    main{padding:var(--gap)}
    .masonry{columns:var(--cols);column-gap:var(--gap)}
    .card{break-inside:avoid;margin-bottom:var(--gap);border-radius:var(--radius);overflow:hidden;position:relative;cursor:pointer;background:var(--surface);opacity:0;transform:translateY(20px);animation:fadeUp .45s forwards}
    @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
    .card img,.card video{width:100%;display:block;border-radius:var(--radius)}
    .card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 50%);border-radius:var(--radius);opacity:0;transition:opacity .25s;display:flex;align-items:flex-end;padding:14px}
    .card:hover .card-overlay{opacity:1}
    .type-badge{background:rgba(255,255,255,.15);backdrop-filter:blur(6px);color:#fff;font-size:.68rem;padding:3px 8px;border-radius:4px;letter-spacing:.05em;text-transform:uppercase;font-weight:500}
    .type-badge.video{background:rgba(255,77,109,.7)}
    .play-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:42px;height:42px;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;pointer-events:none}
    .play-icon svg{fill:#fff;width:16px;height:16px;margin-left:2px}
    .card.is-video:hover .play-icon{opacity:1}
    .lightbox{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.92);backdrop-filter:blur(12px);align-items:center;justify-content:center;padding:24px}
    .lightbox.open{display:flex}
    .lightbox-inner img,.lightbox-inner video{max-width:90vw;max-height:88vh;border-radius:12px;object-fit:contain;box-shadow:0 30px 80px rgba(0,0,0,.6)}
    .lightbox-close{position:fixed;top:20px;right:24px;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:1.4rem;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:1000}
    .lightbox-close:hover{background:rgba(255,255,255,.2)}
    .state-msg{text-align:center;padding:80px 20px;color:var(--muted)}
    .state-msg h2{font-size:1.1rem;font-weight:400;margin-bottom:8px;color:var(--text)}
    .state-msg p{font-size:.85rem;line-height:1.6}
    @media(max-width:1200px){:root{--cols:4}}
    @media(max-width:900px){:root{--cols:3}}
    @media(max-width:600px){:root{--cols:2};header{flex-wrap:wrap}}
    @media(max-width:380px){:root{--cols:1}}
  </style>
</head>
<body>
<header>
  <div class="logo"><span class="dot"></span>Gallery</div>
  <div class="filter-tabs">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="image">Images</button>
    <button class="tab" data-filter="video">Videos</button>
  </div>
  <div class="controls">
    <span class="count-badge" id="countBadge">— items</span>
    <button class="btn" id="shuffleBtn">⇄ Shuffle</button>
  </div>
</header>

<main>
  <div class="masonry" id="grid"></div>
  <div class="state-msg" id="stateMsg"><h2>Loading…</h2></div>
</main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose">✕</button>
  <div class="lightbox-inner" id="lbInner"></div>
</div>

<script>
  /* MEDIA-LIST-START */
  var MEDIA_FILES = ["clip1.mp4", "clip2.webm", "image3.webp", "photo1.jpg", "photo2.png", "video1.mp4"];
  /* MEDIA-LIST-END */

  var MEDIA_FOLDER = 'media/';
  var IMAGE_EXTS = ['jpg','jpeg','png','gif','webp','avif','svg'];
  var VIDEO_EXTS = ['mp4','webm','mov','ogg'];
  var allMedia = [];
  var currentFilter = 'all';

  var grid = document.getElementById('grid');
  var stateMsg = document.getElementById('stateMsg');
  var countBadge = document.getElementById('countBadge');
  var lightbox = document.getElementById('lightbox');
  var lbInner = document.getElementById('lbInner');
  var lbClose = document.getElementById('lbClose');

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length-1; i > 0; i--) {
      var j = Math.floor(Math.random()*(i+1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function getType(f) {
    var ext = f.split('.').pop().toLowerCase();
    if (IMAGE_EXTS.indexOf(ext) !== -1) return 'image';
    if (VIDEO_EXTS.indexOf(ext) !== -1) return 'video';
    return null;
  }

  function buildCard(filename, index) {
    var type = getType(filename);
    if (!type) return null;
    var card = document.createElement('div');
    card.className = 'card' + (type === 'video' ? ' is-video' : '');
    card.style.animationDelay = (index % 20) * 40 + 'ms';
    card.dataset.type = type;
    var media;
    if (type === 'image') {
      media = document.createElement('img');
      media.src = MEDIA_FOLDER + filename;
      media.alt = filename;
      media.loading = 'lazy';
      media.onerror = function() { card.style.display = 'none'; };
    } else {
      media = document.createElement('video');
      media.src = MEDIA_FOLDER + filename;
      media.muted = true; media.loop = true;
      media.preload = 'metadata'; media.playsInline = true;
      media.onerror = function() { card.style.display = 'none'; };
      card.addEventListener('mouseenter', function() { media.play().catch(function(){}); });
      card.addEventListener('mouseleave', function() { media.pause(); media.currentTime = 0; });
    }
    var overlay = document.createElement('div');
    overlay.className = 'card-overlay';
    overlay.innerHTML = '<div class="card-meta"><span class="type-badge '+type+'">'+(type==='video'?'▶ Video':'🖼 Image')+'</span></div>';
    var playIcon = document.createElement('div');
    playIcon.className = 'play-icon';
    playIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
    card.appendChild(media);
    card.appendChild(overlay);
    if (type === 'video') card.appendChild(playIcon);
    card.addEventListener('click', function() { openLightbox(filename, type); });
    return card;
  }

  function renderGrid(files) {
    grid.innerHTML = '';
    if (!files.length) {
      stateMsg.style.display = 'block';
      stateMsg.innerHTML = '<h2>No media found</h2><p>Add files to your media/ folder.</p>';
      countBadge.textContent = '0 items';
      return;
    }
    stateMsg.style.display = 'none';
    countBadge.textContent = files.length + ' item' + (files.length !== 1 ? 's' : '');
    files.forEach(function(f, i) {
      var card = buildCard(f, i);
      if (card) grid.appendChild(card);
    });
  }

  function getFiltered() {
    return currentFilter === 'all' ? allMedia : allMedia.filter(function(f){ return getType(f) === currentFilter; });
  }

  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderGrid(getFiltered());
    });
  });

  document.getElementById('shuffleBtn').addEventListener('click', function() {
    allMedia = shuffle(allMedia);
    renderGrid(getFiltered());
  });

  function openLightbox(filename, type) {
    lbInner.innerHTML = '';
    var el = document.createElement(type === 'image' ? 'img' : 'video');
    el.src = MEDIA_FOLDER + filename;
    if (type === 'image') { el.alt = filename; }
    else { el.controls = true; el.autoplay = true; el.loop = true; }
    lbInner.appendChild(el);
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lbInner.innerHTML = '';
    document.body.style.overflow = '';
  }

  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', function(e){ if(e.target===lightbox) closeLightbox(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeLightbox(); });

  // Start
  allMedia = shuffle(MEDIA_FILES.filter(function(f){ return getType(f); }));
  if (!allMedia.length) {
    stateMsg.style.display = 'block';
    stateMsg.innerHTML = '<h2>No media found</h2><p>GitHub Action has not run yet.</p>';
  } else {
    renderGrid(allMedia);
  }
</script>
</body>
</html>
