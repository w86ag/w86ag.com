<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Media Gallery</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --accent: #ff4d6d;
      --text: #f0f0f0;
      --muted: #666;
      --gap: 12px;
      --cols: 5;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,14,14,0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid #222;
      padding: 14px 24px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
    }

    .logo { font-size: 1.1rem; font-weight: 500; letter-spacing: -0.03em; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; }

    .controls { display: flex; gap: 10px; align-items: center; }

    .btn {
      background: var(--surface); color: var(--text);
      border: 1px solid #333; border-radius: 8px;
      padding: 7px 16px; font-size: 0.82rem;
      font-family: inherit; cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { background: #252525; border-color: #555; }

    .filter-tabs { display: flex; gap: 6px; }
    .tab {
      background: transparent; color: var(--muted);
      border: 1px solid #2a2a2a; border-radius: 20px;
      padding: 5px 14px; font-size: 0.78rem;
      font-family: inherit; cursor: pointer; transition: all 0.2s;
    }
    .tab:hover { color: var(--text); border-color: #444; }
    .tab.active { background: var(--text); color: #000; border-color: var(--text); font-weight: 500; }

    .count-badge { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

    main { padding: var(--gap); }

    .masonry { columns: var(--cols); column-gap: var(--gap); }

    .card {
      break-inside: avoid; margin-bottom: var(--gap);
      border-radius: var(--radius); overflow: hidden;
      position: relative; cursor: pointer;
      background: var(--surface);
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.45s forwards;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .card img, .card video { width: 100%; display: block; border-radius: var(--radius); }

    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 50%);
      border-radius: var(--radius); opacity: 0;
      transition: opacity 0.25s; display: flex;
      align-items: flex-end; padding: 14px;
    }
    .card:hover .card-overlay { opacity: 1; }

    .type-badge {
      background: rgba(255,255,255,0.15); backdrop-filter: blur(6px);
      color: #fff; font-size: 0.68rem; padding: 3px 8px;
      border-radius: 4px; letter-spacing: 0.05em;
      text-transform: uppercase; font-weight: 500;
    }
    .type-badge.video { background: rgba(255,77,109,0.7); }

    .play-icon {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.18); backdrop-filter: blur(8px);
      border-radius: 50%; display: flex;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
    }
    .play-icon svg { fill: #fff; width: 16px; height: 16px; margin-left: 2px; }
    .card.is-video:hover .play-icon { opacity: 1; }

    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
      align-items: center; justify-content: center; padding: 24px;
    }
    .lightbox.open { display: flex; }

    .lightbox-inner img, .lightbox-inner video {
      max-width: 90vw; max-height: 88vh;
      border-radius: 12px; object-fit: contain;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .lightbox-close {
      position: fixed; top: 20px; right: 24px;
      background: rgba(255,255,255,0.1); border: none;
      color: #fff; font-size: 1.4rem;
      width: 40px; height: 40px; border-radius: 50%;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.2s; z-index: 1000;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.2); }

    .state-msg { text-align: center; padding: 80px 20px; color: var(--muted); }
    .state-msg h2 { font-size: 1.1rem; font-weight: 400; margin-bottom: 8px; color: var(--text); }
    .state-msg p { font-size: 0.85rem; line-height: 1.6; }

    .spinner {
      width: 36px; height: 36px; border: 2px solid #333;
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1200px) { :root { --cols: 4; } }
    @media (max-width: 900px)  { :root { --cols: 3; } }
    @media (max-width: 600px)  { :root { --cols: 2; } header { flex-wrap: wrap; } }
    @media (max-width: 380px)  { :root { --cols: 1; } }
  </style>
</head>
<body>

<header>
  <div class="logo"><span class="dot"></span> Gallery</div>
  <div class="filter-tabs">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="image">Images</button>
    <button class="tab" data-filter="video">Videos</button>
  </div>
  <div class="controls">
    <span class="count-badge" id="countBadge">— items</span>
    <button class="btn" id="shuffleBtn">⇄ Shuffle</button>
  </div>
</header>

<main>
  <div class="masonry" id="grid"></div>
  <div class="state-msg" id="stateMsg">
    <div class="spinner"></div>
    <h2>Loading…</h2>
  </div>
</main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose">✕</button>
  <div class="lightbox-inner" id="lbInner"></div>
</div>

<script>
  /* =====================================================
     MEDIA FILES LIST — auto-updated by GitHub Actions
     DO NOT edit between the two MEDIA-LIST comment tags
  ====================================================== */
  /* MEDIA-LIST-START */
  var MEDIA_FILES = [];
  /* MEDIA-LIST-END */

  var MEDIA_FOLDER = 'media/';
  var IMAGE_EXTS = ['jpg','jpeg','png','gif','webp','avif','svg'];
  var VIDEO_EXTS = ['mp4','webm','mov','ogg'];

  var allMedia = [];
  var currentFilter = 'all';

  var grid       = document.getElementById('grid');
  var stateMsg   = document.getElementById('stateMsg');
  var countBadge = document.getElementById('countBadge');
  var lightbox   = document.getElementById('lightbox');
  var lbInner    = document.getElementById('lbInner');
  var lbClose    = document.getElementById('lbClose');

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function getType(filename) {
    var ext = filename.split('.').pop().toLowerCase();
    if (IMAGE_EXTS.indexOf(ext) !== -1) return 'image';
    if (VIDEO_EXTS.indexOf(ext) !== -1) return 'video';
    return null;
  }

  function buildCard(filename, index) {
    var type = getType(filename);
    if (!type) return null;

    var card = document.createElement('div');
    card.className = 'card' + (type === 'video' ? ' is-video' : '');
    card.style.animationDelay = (index % 20) * 40 + 'ms';
    card.dataset.type = type;

    var media;
    if (type === 'image') {
      media = document.createElement('img');
      media.src = MEDIA_FOLDER + filename;
      media.alt = filename;
      media.loading = 'lazy';
      media.onerror = function() { card.style.display = 'none'; };
    } else {
      media = document.createElement('video');
      media.src = MEDIA_FOLDER + filename;
      media.muted = true;
      media.loop = true;
      media.preload = 'metadata';
      media.playsInline = true;
      media.onerror = function() { card.style.display = 'none'; };
      card.addEventListener('mouseenter', function() { media.play().catch(function(){}); });
      card.addEventListener('mouseleave', function() { media.pause(); media.currentTime = 0; });
    }

    var overlay = document.createElement('div');
    overlay.className = 'card-overlay';
    overlay.innerHTML = '<div class="card-meta"><span class="type-badge ' + type + '">' + (type === 'video' ? '▶ Video' : '🖼 Image') + '</span></div>';

    var playIcon = document.createElement('div');
    playIcon.className = 'play-icon';
    playIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';

    card.appendChild(media);
    card.appendChild(overlay);
    if (type === 'video') card.appendChild(playIcon);
    card.addEventListener('click', function() { openLightbox(filename, type); });

    return card;
  }

  function renderGrid(files) {
    grid.innerHTML = '';
    if (files.length === 0) {
      stateMsg.style.display = 'block';
      stateMsg.innerHTML = '<h2>No media found</h2><p>No ' + (currentFilter === 'all' ? '' : currentFilter + ' ') + 'files match your filter.</p>';
      countBadge.textContent = '0 items';
      return;
    }
    stateMsg.style.display = 'none';
    countBadge.textContent = files.length + ' item' + (files.length !== 1 ? 's' : '');
    files.forEach(function(filename, i) {
      var card = buildCard(filename, i);
      if (card) grid.appendChild(card);
    });
  }

  function getFiltered() {
    if (currentFilter === 'all') return allMedia;
    return allMedia.filter(function(f) { return getType(f) === currentFilter; });
  }

  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderGrid(getFiltered());
    });
  });

  document.getElementById('shuffleBtn').addEventListener('click', function() {
    allMedia = shuffle(allMedia);
    renderGrid(getFiltered());
  });

  function openLightbox(filename, type) {
    lbInner.innerHTML = '';
    var el;
    if (type === 'image') {
      el = document.createElement('img');
      el.src = MEDIA_FOLDER + filename;
      el.alt = filename;
    } else {
      el = document.createElement('video');
      el.src = MEDIA_FOLDER + filename;
      el.controls = true;
      el.autoplay = true;
      el.loop = true;
    }
    lbInner.appendChild(el);
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    lbInner.innerHTML = '';
    document.body.style.overflow = '';
  }

  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', function(e) { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });

  // Init
  var files = MEDIA_FILES.filter(function(f) { return getType(f); });
  if (files.length === 0) {
    stateMsg.style.display = 'block';
    stateMsg.innerHTML = '<h2>No media found</h2><p>GitHub Action has not run yet, or media/ folder is empty.</p>';
    countBadge.textContent = '0 items';
  } else {
    allMedia = shuffle(files);
    renderGrid(allMedia);
  }
</script>
</body>
</html>
