name: Generate media list

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject media list into index.html
        run: |
          python3 << 'EOF'
          import os, json, re

          # Supported file types
          EXTENSIONS = {
            'jpg','jpeg','png','gif','webp','avif','svg',
            'mp4','webm','mov','ogg'
          }

          # Scan media/ folder
          files = []
          media_dir = 'media'
          if os.path.isdir(media_dir):
            for f in sorted(os.listdir(media_dir)):
              ext = f.rsplit('.', 1)[-1].lower() if '.' in f else ''
              if ext in EXTENSIONS:
                files.append(f)

          print(f"Found {len(files)} media files: {files}")

          # Write media.json
          with open('media.json', 'w') as jf:
            json.dump(files, jf)

          # Read index.html
          with open('index.html', 'r', encoding='utf-8') as hf:
            html = hf.read()

          # Replace ANYTHING between the markers with fresh file list
          # Markers are comment tags we embed in index.html
          json_str = json.dumps(files)
          new_line = f'  const MEDIA_FILES = {json_str}; // AUTO-GENERATED'

          # Replace between marker comments
          pattern = r'// AUTO-INJECT-START.*?// AUTO-INJECT-END'
          replacement = f'// AUTO-INJECT-START\n{new_line}\n  // AUTO-INJECT-END'
          new_html = re.sub(pattern, replacement, html, flags=re.DOTALL)

          if new_html == html:
            print("WARNING: markers not found in index.html!")
          else:
            print("Successfully updated index.html")

          with open('index.html', 'w', encoding='utf-8') as hf:
            hf.write(new_html)

          EOF

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html media.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "🤖 Auto-update media list"
            git push
          fi
