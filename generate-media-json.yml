name: Generate media list

# Runs automatically whenever you push or upload files to GitHub
on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject media list into index.html
        run: |
          echo "Scanning media/ folder..."

          EXTENSIONS=("jpg" "jpeg" "png" "gif" "webp" "avif" "svg" "mp4" "webm" "mov" "ogg")

          FILES=()
          for EXT in "${EXTENSIONS[@]}"; do
            while IFS= read -r -d '' FILE; do
              BASENAME=$(basename "$FILE")
              FILES+=("\"$BASENAME\"")
            done < <(find media/ -maxdepth 1 -iname "*.${EXT}" -print0 2>/dev/null)
          done

          # Build JS array string
          JSON_ARRAY="[$(IFS=,; echo "${FILES[*]}")]"
          echo "Found ${#FILES[@]} files: $JSON_ARRAY"

          # Also write media.json as backup
          echo "$JSON_ARRAY" > media.json

          # Inject directly into index.html — no fetch needed, no CORS issues
          sed -i "s|const MEDIA_FILES = window.__MEDIA_FILES__ || \[\];|const MEDIA_FILES = $JSON_ARRAY;|g" index.html

          echo "Done! index.html updated."

      - name: Commit changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html media.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "🤖 Auto-update media list"
            git push
          fi
