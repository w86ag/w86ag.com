name: Generate media.json

# ─── Runs automatically whenever you push or upload files to GitHub ───
on:
  push:
    branches:
      - main
      - master
    paths:
      - 'media/**'   # only triggers when files in media/ folder change

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # allows the action to commit media.json back

    steps:

      # Step 1 — Download your repo files
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Scan media folder and generate media.json
      - name: Generate media.json
        run: |
          echo "Scanning media/ folder..."

          # Supported extensions
          EXTENSIONS=("jpg" "jpeg" "png" "gif" "webp" "avif" "svg" "mp4" "webm" "mov" "ogg")

          # Collect all matching files
          FILES=()
          for EXT in "${EXTENSIONS[@]}"; do
            while IFS= read -r -d '' FILE; do
              BASENAME=$(basename "$FILE")
              FILES+=("\"$BASENAME\"")
            done < <(find media/ -maxdepth 1 -iname "*.${EXT}" -print0 2>/dev/null)
          done

          # Build JSON array
          JSON="["
          for i in "${!FILES[@]}"; do
            if [ $i -gt 0 ]; then
              JSON+=","
            fi
            JSON+="${FILES[$i]}"
          done
          JSON+="]"

          echo "$JSON" > media.json
          echo "Done! Found ${#FILES[@]} media files."
          echo "media.json content:"
          cat media.json

      # Step 3 — Commit and push media.json back to your repo
      - name: Commit media.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add media.json
          # Only commit if media.json actually changed
          if git diff --staged --quiet; then
            echo "No changes to media.json — skipping commit."
          else
            git commit -m "🤖 Auto-update media.json"
            git push
          fi
