name: Update media list

on:
  push:
    branches:
      - main
      - master

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate media-list.js
        run: |
          python3 - << 'PYEOF'
          import os, json

          EXTENSIONS = {'jpg','jpeg','png','gif','webp','avif','svg','mp4','webm','mov','ogg'}

          files = []
          if os.path.isdir('media'):
              for f in sorted(os.listdir('media')):
                  ext = f.rsplit('.', 1)[-1].lower() if '.' in f else ''
                  if ext in EXTENSIONS:
                      files.append(f)

          print(f"Found {len(files)} files: {files}")

          # Write media-list.js — loaded as a normal script tag, no fetch, no CORS
          js = f'window.MEDIA_FILES = {json.dumps(files, ensure_ascii=False)};'
          with open('media-list.js', 'w') as f:
              f.write(js)

          print("media-list.js written:")
          print(js)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add media-list.js
          if git diff --staged --quiet; then
            echo "No changes, skipping commit."
          else
            git commit -m "🤖 Auto-update media-list.js"
            git push
          fi
