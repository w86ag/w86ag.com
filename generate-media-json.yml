name: Update media list

on:
  push:
    branches:
      - main
      - master

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update media list in index.html
        run: |
          python3 - << 'PYEOF'
          import os, re, json

          EXTENSIONS = {'jpg','jpeg','png','gif','webp','avif','svg','mp4','webm','mov','ogg'}

          # Scan media folder
          files = []
          if os.path.isdir('media'):
              for f in sorted(os.listdir('media')):
                  ext = f.rsplit('.', 1)[-1].lower() if '.' in f else ''
                  if ext in EXTENSIONS:
                      files.append(f)

          print(f"Found {len(files)} files: {files}")

          # Write media.json too
          with open('media.json', 'w') as f:
              json.dump(files, f)

          # Read index.html
          with open('index.html', 'r') as f:
              html = f.read()

          # Replace everything between the marker comments
          new_var = f'  var MEDIA_FILES = {json.dumps(files)};'
          new_html = re.sub(
              r'/\* MEDIA-LIST-START \*/.*?/\* MEDIA-LIST-END \*/',
              f'/* MEDIA-LIST-START */\n{new_var}\n  /* MEDIA-LIST-END */',
              html,
              flags=re.DOTALL
          )

          if new_html == html:
              print("ERROR: Could not find markers in index.html!")
              exit(1)
          else:
              print("SUCCESS: index.html updated!")
              print(f"New line: {new_var}")

          with open('index.html', 'w') as f:
              f.write(new_html)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add index.html media.json
          if git diff --staged --quiet; then
            echo "Nothing changed, skipping commit."
          else
            git commit -m "🤖 Auto-update media list"
            git push
          fi
